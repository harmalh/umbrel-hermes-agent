name: Build Hermes Agent Image (Manual)

on:
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "NousResearch/hermes-agent git ref (tag/branch/sha)"
        required: true
        default: "main"
      image_repository:
        description: "Container repository to publish to"
        required: true
        default: "ghcr.io/harmalh/hermes-agent-umbrel"
      push_image:
        description: "Push built image to registry"
        type: boolean
        required: true
        default: false
      image_tag:
        description: "Optional registry tag (e.g. 0.2.0). If empty, uses hermes_ref for tags."
        required: false
        default: ""

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve tags
        id: vars
        env:
          INPUT_REF: ${{ github.event.inputs.hermes_ref }}
          IMAGE_REPOSITORY: ${{ github.event.inputs.image_repository }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          if [ -n "${IMAGE_TAG}" ]; then
            echo "tag_primary=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "tag_secondary=${IMAGE_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_primary=${INPUT_REF}" >> "$GITHUB_OUTPUT"
            echo "tag_secondary=${INPUT_REF#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout upstream Hermes Agent
        uses: actions/checkout@v6
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ inputs.hermes_ref }}
          path: upstream-hermes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build multi-arch image (and optionally push)
        id: buildx
        uses: docker/build-push-action@v7
        with:
          context: ./upstream-hermes
          file: ./upstream-hermes/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.push_image }}
          tags: |
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.tag_primary }}
            ${{ steps.vars.outputs.image_repository }}:${{ steps.vars.outputs.tag_secondary }}

      - name: Print digest
        if: ${{ inputs.push_image }}
        run: |
          echo "Pin this multi-arch index digest in docker-compose.yml (hermes service):"
          echo "  image: ${{ steps.vars.outputs.image_repository }}:<tag>@${{ steps.buildx.outputs.digest }}"
          echo "Full digest value: ${{ steps.buildx.outputs.digest }}"
          echo ""
          echo "Umbrel: set this GHCR package visibility to PUBLIC (GitHub profile -> Packages ->"
          echo "  hermes-agent-umbrel -> Package settings) or installs will fail at docker pull."

      - name: Local smoke test (amd64 only)
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t local/hermes-smoke:${{ github.run_id }} \
            ./upstream-hermes

          docker run --rm local/hermes-smoke:${{ github.run_id }} --help
