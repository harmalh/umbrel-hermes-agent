name: Release Hermes Gateway To Umbrel Community Store

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "umbrel-app.yml"
      - "assets/**"
      - ".github/workflows/release-to-umbrel-community-store.yml"
  workflow_dispatch:
    inputs:
      hermes_ref:
        description: "NousResearch/hermes-agent git ref (tag/branch/sha)"
        required: false
        default: "v2026.4.8"
      release_version:
        description: "Optional Umbrel app version override"
        required: false
        default: ""
      image_tag:
        description: "Optional GHCR image tag override"
        required: false
        default: ""

concurrency:
  group: release-hermes-gateway-store-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      COMMUNITY_STORE_REPO: harmalh/umbrel-community-store
      COMMUNITY_STORE_APP_DIR: harmalh-hermes-agent
      IMAGE_NAME: ghcr.io/harmalh/hermes-agent-umbrel

    steps:
      - name: Verify community store token is configured
        shell: bash
        env:
          COMMUNITY_STORE_PAT: ${{ secrets.COMMUNITY_STORE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${COMMUNITY_STORE_PAT}" ]; then
            echo "Missing required secret COMMUNITY_STORE_PAT" >&2
            echo "Create a fine-grained GitHub token with Contents: Read and write on harmalh/umbrel-community-store." >&2
            exit 1
          fi

      - name: Checkout packaging repo
        uses: actions/checkout@v6

      - name: Checkout community store repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.COMMUNITY_STORE_REPO }}
          token: ${{ secrets.COMMUNITY_STORE_PAT }}
          path: community-store

      - name: Resolve release inputs
        id: release
        shell: bash
        env:
          DEFAULT_HERMES_REF: v2026.4.8
          OVERRIDE_HERMES_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.hermes_ref || '' }}
          OVERRIDE_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_version || '' }}
          OVERRIDE_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          manifest_text = Path('umbrel-app.yml').read_text(encoding='utf-8')
          match = re.search(r'^version:\s*"([^"]+)"', manifest_text, flags=re.MULTILINE)
          if not match:
              raise SystemExit('Could not read version from umbrel-app.yml')

          source_version = match.group(1)
          release_version = os.environ.get('OVERRIDE_RELEASE_VERSION', '').strip() or source_version
          image_tag = os.environ.get('OVERRIDE_IMAGE_TAG', '').strip() or release_version
          hermes_ref = os.environ.get('OVERRIDE_HERMES_REF', '').strip() or os.environ['DEFAULT_HERMES_REF']

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'source_version={source_version}\n')
              fh.write(f'release_version={release_version}\n')
              fh.write(f'image_tag={image_tag}\n')
              fh.write(f'hermes_ref={hermes_ref}\n')
          PY

      - name: Show resolved release plan
        shell: bash
        run: |
          echo "Source version:  ${{ steps.release.outputs.source_version }}"
          echo "Release version: ${{ steps.release.outputs.release_version }}"
          echo "Image tag:       ${{ steps.release.outputs.image_tag }}"
          echo "Hermes ref:      ${{ steps.release.outputs.hermes_ref }}"

      - name: Checkout upstream Hermes Agent
        uses: actions/checkout@v6
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ steps.release.outputs.hermes_ref }}
          path: upstream-hermes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: buildx
        uses: docker/build-push-action@v7
        with:
          context: ./upstream-hermes
          file: ./upstream-hermes/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}

      - name: Print digest
        shell: bash
        run: |
          echo "Image digest: ${{ steps.buildx.outputs.digest }}"

      - name: Local smoke test (amd64 only)
        shell: bash
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t local/hermes-smoke:${{ github.run_id }} \
            ./upstream-hermes

          docker run --rm local/hermes-smoke:${{ github.run_id }} --help

      - name: Prepare community store release files
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          IMAGE_TAG: ${{ steps.release.outputs.image_tag }}
          IMAGE_DIGEST: ${{ steps.buildx.outputs.digest }}
          HERMES_REF: ${{ steps.release.outputs.hermes_ref }}
        run: |
          set -euo pipefail
          target_dir="community-store/${COMMUNITY_STORE_APP_DIR}"
          rm -rf "${target_dir}"
          mkdir -p "${target_dir}"

          cp docker-compose.yml umbrel-app.yml "${target_dir}/"
          for item in assets hooks scripts www; do
            if [ -e "${item}" ]; then
              cp -R "${item}" "${target_dir}/"
            fi
          done

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          target_dir = Path('community-store') / os.environ['COMMUNITY_STORE_APP_DIR']
          compose_path = target_dir / 'docker-compose.yml'
          manifest_path = target_dir / 'umbrel-app.yml'

          release_version = os.environ['RELEASE_VERSION']
          image_tag = os.environ['IMAGE_TAG']
          image_digest = os.environ['IMAGE_DIGEST']

          compose_text = compose_path.read_text(encoding='utf-8')
          compose_text = re.sub(
              r'(^\s*image:\s*)ghcr\.io/harmalh/hermes-agent-umbrel:[^\s@]+(?:@[^\s]+)?$',
              rf'\1ghcr.io/harmalh/hermes-agent-umbrel:{image_tag}@{image_digest}',
              compose_text,
              flags=re.MULTILINE,
          )
          compose_path.write_text(compose_text, encoding='utf-8')

          manifest_text = manifest_path.read_text(encoding='utf-8')
          manifest_text = re.sub(
              r'^version:\s*"[^"]+"',
              f'version: "{release_version}"',
              manifest_text,
              flags=re.MULTILINE,
          )
          manifest_text = re.sub(
              r'^icon:\s*.*$',
              'icon: https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-hermes-agent/assets/icon.svg',
              manifest_text,
              flags=re.MULTILINE,
          )
          manifest_text = re.sub(
              r'^submission:\s*.*$',
              'submission: https://github.com/harmalh/umbrel-community-store',
              manifest_text,
              flags=re.MULTILINE,
          )
          manifest_path.write_text(manifest_text + '\n', encoding='utf-8')
          PY

      - name: Commit and push community store release
        shell: bash
        run: |
          set -euo pipefail
          cd community-store
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${COMMUNITY_STORE_APP_DIR}"

          if git diff --cached --quiet; then
            echo "No community store changes to publish"
            exit 0
          fi

          git commit -m "Release Hermes Gateway ${{ steps.release.outputs.release_version }}"
          git push origin HEAD:main
