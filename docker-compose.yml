version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: harmalh-hermes-agent_web_1
      APP_PORT: 80

  web:
    image: nginx:1.25-alpine
    restart: on-failure
    init: true
    volumes:
      - ${APP_DATA_DIR}/www:/usr/share/nginx/html:ro

  # Multi-arch index digest from workflow run 23928504678 (main @ 2026-04-03).
  hermes:
    image: ghcr.io/harmalh/hermes-agent-umbrel:0.2.0@sha256:a7ee8728416b9e368b108f645978f4426b6556d64dc20c6a0a7427a21ba8e1ea
    restart: on-failure
    init: true
    stop_grace_period: 1m
    shm_size: "1gb"
    command: ["gateway", "run"]
    volumes:
      - ${APP_DATA_DIR}/data:/opt/data
