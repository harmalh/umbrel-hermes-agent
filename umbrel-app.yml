manifestVersion: 1.1
id: harmalh-hermes-agent
name: Hermes Agent
tagline: Self-improving AI agent with messaging gateway (Nous Research)
icon: https://raw.githubusercontent.com/harmalh/umbrel-hermes-agent/main/assets/icon.svg
category: ai
version: "0.2.1"
port: 80
description: >-
  Hermes Agent runs a persistent messaging gateway (Telegram, Discord, Slack,
  WhatsApp, Signal, and more) from a Docker container with data under APP_DATA_DIR.


  This Umbrel package uses two services: an nginx status/setup page (what you open
  from the dashboard) and a hermes service running gateway run. The image is a
  multi-arch build (amd64 + arm64) published to GHCR from upstream
  NousResearch/hermes-agent. The GHCR image is digest-pinned for reproducible installs.


  Expect roughly 2–4 GB RAM when browser tools are used; the image is large
  (Debian + Playwright/Chromium). First-time API keys and config live in the
  app data folder (.env, config.yaml); use Umbrel Terminal and docker exec or
  edit files on the host per upstream docs.


  **Install via community store:** https://github.com/harmalh/umbrel-community-store
developer: Nous Research
website: https://github.com/NousResearch/hermes-agent
submitter: Harm Alhusen
submission: https://github.com/harmalh/umbrel-community-store
repo: https://github.com/NousResearch/hermes-agent
support: https://github.com/NousResearch/hermes-agent/issues
gallery: []
releaseNotes: >-
  Pin multi-arch GHCR image (0.2.0@sha256:a7ee8728416b…) from Actions run 23928504678;
  upstream Hermes main at build time. No functional change vs 0.2.0 compose layout.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
