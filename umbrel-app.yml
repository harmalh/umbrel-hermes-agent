manifestVersion: 1.1
id: harmalh-hermes-agent
name: Hermes Gateway
tagline: Headless Hermes runtime and messaging gateway
icon: https://raw.githubusercontent.com/harmalh/umbrel-hermes-agent/main/assets/icon.svg
category: ai
version: "0.2.5"
port: 23110
description: >-
  Hermes Gateway runs the Hermes messaging and automation runtime as a
  background service on Umbrel.


  This package keeps the current two-service topology: an nginx status/setup
  page in the browser and a hermes container running gateway run with data under
  APP_DATA_DIR.


  Use this app when you want a headless Hermes gateway for messaging platforms
  and background automation. Use the separate Hermes Workspace app for the full
  browser UI.


  The image is a multi-arch build published to GHCR and pinned in compose for
  reproducible installs.
developer: Nous Research
website: https://github.com/NousResearch/hermes-agent
submitter: Harm Alhusen
submission: https://github.com/harmalh/umbrel-community-store
repo: https://github.com/NousResearch/hermes-agent
support: https://github.com/NousResearch/hermes-agent/issues
gallery: []
releaseNotes: >-
  Rebuild Hermes Gateway against the newer stable `NousResearch/hermes-agent`
  release `v2026.4.8` and refresh the digest-pinned GHCR image.

  This keeps the Umbrel package topology unchanged while pulling in upstream
  runtime fixes from the latest tagged Hermes release.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
